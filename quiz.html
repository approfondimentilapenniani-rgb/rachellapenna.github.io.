<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Che Personaggio Sei? | TGS Experience</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
    <div class="logo">BARNUM'S CIRCUS</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="cast.html">Cast</a>
        <a href="musica.html">Musica</a>
        <a href="quiz.html" class="active">Quiz</a>
        <a href="curiosita.html">Curiosità</a>
        <a href="galleria.html">Galleria</a>
    </div>
</nav>

<main class="container">
    <h2 class="section-title">Scopri la tua anima da Showman</h2>
    
    <div id="quiz-box" class="music-card" style="max-width: 800px; margin: 0 auto; min-height: 400px; display: flex; flex-direction: column; justify-content: center;">
        <div id="progress-bar" style="color: var(--accent-gold); margin-bottom: 10px; font-size: 0.9rem;"></div>
        <h3 id="question-text" style="color: var(--accent-gold); margin-bottom: 25px; font-family: 'Playfair Display', serif; font-size: 1.8rem;"></h3>
        <div id="options-container" style="display: flex; flex-direction: column; gap: 12px;">
            </div>
    </div>

    <div id="result-area" style="display:none; text-align:center;" class="music-card">
        <p style="color: var(--accent-gold); text-transform: uppercase; letter-spacing: 2px;">Il tuo destino è scritto...</p>
        <h3 id="char-name" style="color: var(--accent-gold); font-size: 3rem; font-family: 'Playfair Display', serif; margin: 20px 0;"></h3>
        <p id="char-desc" style="font-size: 1.2rem; margin-bottom: 30px; line-height: 1.8;"></p>
        <button onclick="location.reload()" class="btn-result" style="width: auto; padding: 15px 40px;">Ricomincia lo Show</button>
    </div>
</main>

<script>
    const questions = [
        { q: "Qual è la tua reazione davanti a un fallimento?", a: "Mi invento subito un piano B folle", b: "Cerco il supporto degli amici", c: "Proteggo ciò che resta", d: "Mi chiudo in me stesso" },
        { q: "Cosa noti per primo entrando in una stanza?", a: "Le potenzialità di trasformazione", b: "Le persone e i loro sguardi", c: "L'atmosfera accogliente", d: "L'estetica e l'eleganza" },
        { q: "In un gruppo di amici, tu sei quello che...", a: "Propone idee folli e trascina tutti", b: "Difende chi è trattato ingiustamente", c: "Ascolta e dà i consigli migliori", d: "Rimane in disparte finché non si fida" },
        { q: "Qual è il tuo rapporto con i soldi?", a: "Mezzo per realizzare sogni giganti", b: "Strumento per ottenere libertà", c: "Sicurezza per la mia casa", d: "Simbolo di successo e rispetto" },
        { q: "Scegli un colore che ti rappresenta:", a: "Rosso Scarlatto (Energia)", b: "Viola Elettrico (Mistero)", c: "Blu Profondo (Lealtà)", d: "Oro o Bianco (Perfezione)" },
        { q: "Cosa ti spaventa di più?", a: "Essere una persona comune", b: "Vivere secondo le regole altrui", c: "Perdere il legame con i cari", d: "Essere giudicato solo per l'aspetto" },
        { q: "Come descriveresti il tuo stile?", a: "Eccentrico: voglio essere guardato", b: "Pratico ma unico", c: "Classico e semplice", d: "Elegante e impeccabile" },
        { q: "Qual è la tua citazione preferita?", a: "Il mondo è un palcoscenico", b: "Non lasciarli vincere", c: "La casa è dove c'è il cuore", d: "Tutto il resto è rumore" },
        { q: "Sei su un palco davanti a migliaia di persone. Cosa provi?", a: "Sono nel mio habitat naturale!", b: "Emozione pura insieme alla mia famiglia", c: "Disagio, preferirei stare dietro le quinte", d: "Concentrazione: deve essere perfetto" },
        { q: "Cosa cerchi in un partner?", a: "Qualcuno che creda nei miei sogni", b: "Qualcuno che sfidi il mondo con me", c: "Qualcuno che apprezzi la semplicità", d: "Qualcuno che veda oltre la mia maschera" },
        { q: "Qual è la tua stagione preferita?", a: "Estate: tutto è possibile", b: "Autunno: tempo di cambiamenti", c: "Primavera: rinascita in famiglia", d: "Inverno: eleganza e teatri chiusi" },
        { q: "Come gestisci i pregiudizi degli altri?", a: "Li ignoro e dimostro il mio valore", b: "Rispondo con orgoglio: Questa/o sono io", c: "Spiego che la diversità è un dono", d: "Mi feriscono, ma vado avanti col talento" },
        { q: "Se potessi viaggiare nel tempo, dove andresti?", a: "Nel futuro per vedere nuove invenzioni", b: "In un'epoca di grandi rivoluzioni", c: "Resto qui con i miei cari", d: "In un'epoca di pura arte classica" },
        { q: "Qual è il tuo ruolo in un progetto collettivo?", a: "Il leader visionario", b: "Colui che fa il lavoro fisico", c: "Il mediatore del gruppo", d: "L'esperto della qualità finale" },
        { q: "Cos'è per te la 'Magia'?", a: "Sorprendere chi non ci credeva più", b: "Sentirsi volare via dai problemi", c: "Vedere il sorriso di chi amo", d: "Una nota cantata perfettamente" }
    ];

    let currentQ = 0;
    let scores = { A: 0, B: 0, C: 0, D: 0 };

    function loadQuestion() {
        if (currentQ < questions.length) {
            document.getElementById('progress-bar').innerText = `Domanda ${currentQ + 1} di ${questions.length}`;
            const q = questions[currentQ];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('options-container').innerHTML = `
                <button class="quiz-btn" onclick="answer('A')">${q.a}</button>
                <button class="quiz-btn" onclick="answer('B')">${q.b}</button>
                <button class="quiz-btn" onclick="answer('C')">${q.c}</button>
                <button class="quiz-btn" onclick="answer('D')">${q.d}</button>
            `;
        } else {
            showResult();
        }
    }

    function answer(letter) {
        scores[letter]++;
        currentQ++;
        loadQuestion();
    }

    function showResult() {
        document.getElementById('quiz-box').style.display = 'none';
        const resArea = document.getElementById('result-area');
        resArea.style.display = 'block';
        
        let winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        
        const results = {
            A: { name: "P.T. BARNUM 🎩", desc: "Sei un visionario nato. Non vedi ostacoli, solo opportunità per creare qualcosa di meraviglioso. La tua ambizione è il tuo motore, ma ricorda che lo show è più bello se condiviso con chi ami." },
            B: { name: "ANNE WHEELER o PHILLIP 🎪", desc: "Sei uno spirito libero e coraggioso. Per te l'amore e la lealtà valgono più di ogni regola sociale. Sei pronto a 'riscrivere le stelle' pur di seguire il tuo cuore." },
            C: { name: "CHARITY BARNUM 🏠", desc: "Sei la roccia su cui poggiano i sogni degli altri. Hai capito che la vera ricchezza non sono gli applausi, ma la pace di una casa e la felicità delle piccole cose." },
            D: { name: "LETTIE LUTZ o JENNY LIND 🎤", desc: "Sei l'anima del palco. Hai una sensibilità profonda e un talento immenso che a volte ti fa sentire solo/a. Cerchi l'accettazione e quando la trovi, la tua luce brilla più di chiunque altro." }
        };

        document.getElementById('char-name').innerText = results[winner].name;
        document.getElementById('char-desc').innerText = results[winner].desc;
    }

    loadQuestion();
</script>

</body>
</html>
