<main class="container">
    <h2 class="section-title">Che Personaggio Sei?</h2>
    
    <div id="quiz-box" class="music-card">
        <h3 id="question-text" style="color:var(--accent-gold); margin-bottom:20px;">Caricamento...</h3>
        <div id="options-container"></div>
    </div>

    <div id="result-area" style="display:none;" class="music-card">
        <h3 id="char-name" style="color:var(--accent-gold); font-size:2.5rem; text-align:center;"></h3>
        <p id="char-desc" style="text-align:center; margin-top:20px;"></p>
        <button onclick="location.reload()" class="btn-result">Rifai il Quiz</button>
    </div>
</main>

<script>
    const questions = [
        { q: "Qual è la tua reazione al fallimento?", a: "A) Piano B subito", b: "B) Cerco amici", c: "C) Proteggo la famiglia", d: "D) Mi chiudo in me" },
        { q: "Cosa noti per primo in una stanza?", a: "A) Le potenzialità", b: "B) Le persone", c: "C) L'atmosfera", d: "D) L'eleganza" },
        // ... Aggiungi qui le altre 13 domande seguendo lo stesso schema ...
        { q: "Cos'è per te la Magia?", a: "A) Sorprendere", b: "B) Volare via", c: "C) Un sorriso caro", d: "D) Una nota perfetta" }
    ];

    let currentQ = 0;
    let scores = { A: 0, B: 0, C: 0, D: 0 };

    function loadQuestion() {
        if (currentQ < questions.length) {
            const q = questions[currentQ];
            document.getElementById('question-text').innerText = (currentQ + 1) + ". " + q.q;
            document.getElementById('options-container').innerHTML = `
                <button class="quiz-btn" onclick="answer('A')">${q.a}</button>
                <button class="quiz-btn" onclick="answer('B')">${q.b}</button>
                <button class="quiz-btn" onclick="answer('C')">${q.c}</button>
                <button class="quiz-btn" onclick="answer('D')">${q.d}</button>
            `;
        } else {
            showResult();
        }
    }

    function answer(letter) {
        scores[letter]++;
        currentQ++;
        loadQuestion();
    }

    function showResult() {
        document.getElementById('quiz-box').style.display = 'none';
        const res = document.getElementById('result-area');
        res.style.display = 'block';
        let winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        
        const names = { A: "P.T. Barnum", B: "Anne o Phillip", C: "Charity Barnum", D: "Lettie o Jenny" };
        document.getElementById('char-name').innerText = "Sei " + names[winner] + "!";
    }

    loadQuestion();
</script>
